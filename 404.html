<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Redirecting...</title>
</head>
<body>
  <script>
    (function () {
      var segment = location.pathname.split('/').filter(Boolean).pop() || '';
      var routes = {
        login: 'login.html',
        register: 'register.html',
        dashboard: 'dashboard.html'
      };

      if (routes[segment]) {
        location.replace('./' + routes[segment]);
        return;
      }

      location.replace('./login');
    })();
  </script>
</body>
</html>
