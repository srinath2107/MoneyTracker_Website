<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (window.location.pathname.endsWith('/register.html')) {
            window.location.replace('./register');
        }
    </script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>💰 Expense Tracker</h1>
            <form id="registerForm" class="auth-form active-form">
                <h2>Create Account</h2>
                <input type="text" id="regUsername" placeholder="Choose a username" required>
                <input type="password" id="regPassword" placeholder="Password (min 6 chars)" required>
                <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required>
                <button type="submit" class="auth-btn">Register</button>
                <p style="margin-top: 15px; text-align: center;">
                    Already have an account? 
                    <a href="./login" style="color: #2563eb; text-decoration: none;">Login here</a>
                </p>
            </form>
            <div id="authMessage" style="display:none; margin-top:15px; padding:10px; border-radius:6px; text-align:center;"></div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
